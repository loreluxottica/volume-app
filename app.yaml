# Databricks App command. The Lakebase resource (key: "database") injects the
# PostgreSQL connection URL with credentials into DATABASE_URL automatically.
command:
  - gunicorn
  - "app:server"
  - -c
  - gunicorn.conf.py

env:
  - name: DATABASE_URL
    valueFrom: database
  - name: LAKEBASE_SCHEMA
    value: volume_data_entry
